name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@v4.0.1
        with:
          cache: true
          install: true
          install_args: go

      - name: Download modules
        run: mise x -- go mod download

      - name: Verify modules
        run: mise x -- go mod verify

      - name: Check go mod tidy
        run: |
          mise x -- go mod tidy
          (cd plancontract && mise x -- go mod tidy)
          (cd cmd/spanner-query-gen && mise x -- go mod tidy)
          (cd tools && mise x -- go mod tidy)
          git diff --exit-code -- '*.mod' '*.sum' 

      - name: Vet
        run: mise x -- go vet ./...

      - name: Test
        run: mise x -- go test -race -shuffle=on ./...

      - name: Vet plancontract module
        working-directory: plancontract
        run: mise x -- go vet ./...

      - name: Test plancontract module
        working-directory: plancontract
        run: mise x -- go test -race -shuffle=on ./...

      - name: Vet cmd/spanner-query-gen module
        working-directory: cmd/spanner-query-gen
        run: mise x -- go vet ./...

      - name: Test cmd/spanner-query-gen module
        working-directory: cmd/spanner-query-gen
        run: mise x -- go test -race -shuffle=on ./...

      - name: Vet tools module
        working-directory: tools
        run: mise x -- go vet ./...

      - name: Test tools module
        working-directory: tools
        run: mise x -- go test -race -shuffle=on ./...

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@v4.0.1
        with:
          cache: true
          install: true
          install_args: go

      - name: Download modules
        run: mise x -- go mod download

      - name: Run Spanner emulator integration tests
        working-directory: cmd/spanner-query-gen
        run: mise x -- go test -tags=integration -run '^TestIntegration' ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@v4.0.1
        with:
          cache: true
          install: true
          install_args: go golangci-lint

      - name: Run golangci-lint
        run: mise x -- golangci-lint run --timeout=5m

      - name: Run golangci-lint on plancontract module
        working-directory: plancontract
        run: mise x -- golangci-lint run --timeout=5m

      - name: Run golangci-lint on cmd/spanner-query-gen module
        working-directory: cmd/spanner-query-gen
        run: mise x -- golangci-lint run --timeout=5m

      - name: Run golangci-lint on tools module
        working-directory: tools
        run: mise x -- golangci-lint run --timeout=5m

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@v4.0.1
        with:
          cache: true
          install: true
          install_args: go go:golang.org/x/vuln/cmd/govulncheck

      - name: Run govulncheck
        run: mise x -- govulncheck ./...
        # The cmd/spanner-query-gen and tools modules intentionally use
        # spanemuboost/testcontainers for Spanner emulator/Omni workflows,
        # which currently pull Docker client advisories without a fixed
        # upstream version, so govulncheck is not run for those modules.

      - name: Run govulncheck on plancontract module
        working-directory: plancontract
        run: mise x -- govulncheck ./...
